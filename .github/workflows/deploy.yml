name: CI/CD — E-Summit 2026 Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load NVM + verify Node
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          echo "Node: $(node -v) | NPM: $(npm -v)"

      - name: Install production dependencies
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          npm ci --production

      - name: Write .env file
        run: |
          cat > .env << EOF
          PORT=${{ secrets.PORT }}
          NODE_ENV=production
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          UPI_VPA=${{ secrets.UPI_VPA }}
          UPI_MERCHANT_NAME=${{ secrets.UPI_MERCHANT_NAME }}
          UPI_CURRENCY=${{ secrets.UPI_CURRENCY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          ADMIN_KEY=${{ secrets.ADMIN_KEY }}
          EOF

      - name: Reload with PM2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          pm2 reload esummit-backend || pm2 start src/server.js --name "esummit-backend"
          pm2 save

      - name: Verify
        run: |
          sleep 3
          pm2 status esummit-backend