<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Booking Confirmed</title>
  </head>

  <body
    class="m-0 bg-slate-100 p-6 text-slate-700"
    style="font-family: &quot;Manrope&quot;, Arial, sans-serif"
  >
    <!-- Container -->
    <div
      class="mx-auto max-w-[600px] overflow-hidden rounded-xl border border-slate-200 bg-white"
    >
      <!-- Header -->
      <div class="bg-orange-500 px-8 py-6 text-center">
        <h1 class="m-0 text-2xl font-bold text-white">E-SUMMIT '26</h1>
      </div>

      <!-- Body -->
      <div class="space-y-8 p-8 text-slate-700">
        <!-- Greeting -->
        <section>
          <h2 class="mb-3 text-xl font-semibold">Hello {{buyerName}},</h2>

          <p>
            We have successfully confirmed your booking. Your reservation is now complete.
          </p>
        </section>


        <!-- QR Section -->
        <section class="rounded-lg border border-slate-200 p-6 text-center">
          <h3 class="mb-2 text-lg font-semibold">Reservation QR</h3>

          <p class="mb-6 text-sm text-slate-500">
            Save this QR code for future reference.
          </p>

          <img
            src="cid:qr-code"
            alt="QR Code"
            class="mx-auto h-[180px] w-[180px] rounded bg-white p-2"
          />
        </section>
      </div>

      <!-- Footer -->
      <div
        class="border-t border-slate-200 bg-slate-50 px-6 py-5 text-center text-xs text-slate-500"
      >
        © 2026 E-Summit IIT Dharwad<br />

        This is an automated email. Please do not reply.
      </div>
    </div>
  </body>
</html>
