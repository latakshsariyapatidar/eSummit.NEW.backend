<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Booking Confirmed</title>

    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #f1f5f9;
        color: #334155;
        font-family: "Manrope", Arial, sans-serif;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
      }

      .header {
        background: #f97316;
        padding: 24px 32px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        color: #ffffff;
        font-size: 32px;
        font-weight: 700;
      }

      .content {
        padding: 32px;
        color: #334155;
      }

      .section {
        margin-bottom: 32px;
      }

      .section:last-child {
        margin-bottom: 0;
      }

      .section h2 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 600;
      }

      .section h3 {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 600;
      }

      .section p {
        margin: 0;
        line-height: 1.6;
        font-size: 16px;
      }

      .qr-section {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
      }

      .qr-text {
        margin: 0 0 24px;
        color: #64748b;
        font-size: 14px;
      }

      .qr-image {
        display: block;
        width: 180px;
        height: 180px;
        margin: 0 auto;
        background: #ffffff;
        padding: 8px;
        border-radius: 4px;
      }

      .footer {
        border-top: 1px solid #e2e8f0;
        background: #f8fafc;
        padding: 20px 24px;
        text-align: center;
        font-size: 12px;
        color: #64748b;
        line-height: 1.6;
      }

      @media only screen and (max-width: 600px) {
        body {
          padding: 12px;
        }

        .content {
          padding: 24px;
        }

        .header {
          padding: 20px 24px;
        }

        .header h1 {
          font-size: 28px;
        }

        .section h2 {
          font-size: 22px;
        }

        .qr-image {
          width: 160px;
          height: 160px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>E-SUMMIT '26</h1>
      </div>

      <div class="content">
        <div class="section">
          <h2>Hello {{buyerName}},</h2>

          <p>
            We have successfully confirmed your booking. Your reservation is now
            complete.
          </p>
        </div>

        <div class="section qr-section">
          <h3>Reservation QR</h3>

          <p class="qr-text">
            Save this QR code for future reference.
          </p>

          <img
            src="cid:qr-code"
            alt="QR Code"
            class="qr-image"
          />
        </div>
      </div>

      <div class="footer">
        © 2026 E-Summit IIT Dharwad<br />
        This is an automated email. Please do not reply.
      </div>
    </div>
  </body>
</html>
